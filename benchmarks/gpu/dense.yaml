schema_version: 1
suite_id: gpu/dense
title: GPU Dense Benchmarks
description: Dense GPU benchmark contract suite for matmul, batched matmul, and linalg ops.
defaults:
  device: {kind: cuda, ordinal: 0}
  layout: {tenferro: col_major, framework: row_major_contiguous}
  run: {warmups: 3, runs: 7, timing_scope: steady_state_host_api_plus_device_sync}
  verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10}
backends:
  - tenferro-cuda-trace
  - tenferro-cuda-eager
  - pytorch-cuda
  - jax-cuda
  - cublaslt
  - cutlass
  - cusolver
problems:
  - id: dense_matmul_f64_3072
    family: dense
    op: matmul
    dtype: {a: f64, b: f64, c: f64, accum: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: normal, seed: 1}
    matmul: {m: 3072, n: 3072, k: 3072, transpose_a: false, transpose_b: false}
    run: {warmups: 3, runs: 7, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10}
    skip_backends: [cusolver]

  - id: dense_batched_matmul_f64_b1024_256
    family: dense
    op: batched_matmul
    dtype: {a: f64, b: f64, c: f64, accum: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: normal, seed: 2}
    batched_matmul: {batch: 1024, m: 256, n: 256, k: 256, batch_layout: leading}
    run: {warmups: 3, runs: 7, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10}
    skip_backends: [cusolver]

  - id: dense_qr_f64_1536
    family: dense
    op: qr
    dtype: {a: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: well_conditioned, seed: 3}
    linalg: {m: 1536, n: 1536, full_matrices: false}
    run: {warmups: 2, runs: 5, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10}
    only_backends: [tenferro-cuda-trace, tenferro-cuda-eager, pytorch-cuda, jax-cuda, cusolver]

  - id: dense_solve_f64_512_rhs16
    family: dense
    op: solve
    dtype: {a: f64, b: f64, c: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: spd, seed: 4}
    linalg: {n: 512, rhs_cols: 16}
    run: {warmups: 2, runs: 5, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10, residual_rtol: 1.0e-8}
    only_backends: [tenferro-cuda-trace, tenferro-cuda-eager, pytorch-cuda, jax-cuda, cusolver]

  - id: dense_solve_f64_1024_rhs16
    family: dense
    op: solve
    dtype: {a: f64, b: f64, c: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: well_conditioned, seed: 7}
    linalg: {n: 1024, rhs_cols: 16}
    run: {warmups: 2, runs: 5, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10, residual_rtol: 1.0e-8}
    only_backends: [tenferro-cuda-trace, tenferro-cuda-eager, pytorch-cuda, jax-cuda, cusolver]

  - id: dense_solve_f64_2048_rhs16
    family: dense
    op: solve
    dtype: {a: f64, b: f64, c: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: well_conditioned, seed: 8}
    linalg: {n: 2048, rhs_cols: 16}
    run: {warmups: 2, runs: 5, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10, residual_rtol: 1.0e-8}
    only_backends: [tenferro-cuda-trace, tenferro-cuda-eager, pytorch-cuda, jax-cuda, cusolver]

  - id: dense_solve_f64_4096_rhs16
    family: dense
    op: solve
    dtype: {a: f64, b: f64, c: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: well_conditioned, seed: 9}
    linalg: {n: 4096, rhs_cols: 16}
    run: {warmups: 2, runs: 5, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10, residual_rtol: 1.0e-8}
    only_backends: [tenferro-cuda-trace, tenferro-cuda-eager, pytorch-cuda, jax-cuda, cusolver]

  - id: dense_solve_f64_2048_rhs128
    family: dense
    op: solve
    dtype: {a: f64, b: f64, c: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: well_conditioned, seed: 10}
    linalg: {n: 2048, rhs_cols: 128}
    run: {warmups: 2, runs: 5, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10, residual_rtol: 1.0e-8}
    only_backends: [tenferro-cuda-trace, tenferro-cuda-eager, pytorch-cuda, jax-cuda, cusolver]

  - id: dense_svd_f64_256
    family: dense
    op: svd
    dtype: {a: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: well_conditioned, seed: 5}
    linalg: {m: 256, n: 256, full_matrices: false}
    run: {warmups: 2, runs: 5, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10}
    only_backends: [tenferro-cuda-trace, tenferro-cuda-eager, pytorch-cuda, jax-cuda, cusolver]

  - id: dense_eigh_f64_1024
    family: dense
    op: eigh
    dtype: {a: f64}
    layout: {tenferro: col_major, framework: row_major_contiguous}
    data: {generator: spd, seed: 6}
    linalg: {n: 1024}
    run: {warmups: 2, runs: 5, timing_scope: steady_state_host_api_plus_device_sync}
    verify: {reference: cpu_fp64, rtol: 1.0e-8, atol: 1.0e-10, residual_rtol: 1.0e-8}
    only_backends: [tenferro-cuda-trace, tenferro-cuda-eager, pytorch-cuda, jax-cuda, cusolver]
