schema_version: 1
suite_id: gpu/linalg_jvp_vjp
title: GPU Linalg JVP/VJP Benchmarks
description: Trace-mode linalg automatic differentiation on CUDA for tenferro-rs,
  PyTorch, and JAX.
defaults:
  device:
    kind: cuda
    ordinal: 0
  layout:
    tenferro: col_major
    framework: row_major_contiguous
  run:
    warmups: 3
    runs: 7
    timing_scope: steady_state_host_api_plus_device_sync
  verify:
    reference: cpu_fp64
    rtol: 1.0e-05
    atol: 1.0e-08
backends:
- tenferro-cuda-trace
- pytorch-cuda
- jax-cuda
