schema_version: 1
suite_id: gpu/permutation
title: GPU Permutation / Materialize Benchmarks
description: >-
  Materialize-kernel benchmark comparing tenferro-rs CUDA transpose/materialize
  paths against cuTENSOR, PyTorch CUDA, JAX CUDA, and a device-to-device memcpy
  baseline on identical permutation semantics. Ports docs/permutation-suite.md
  (cpu/permutation) to CUDA; see docs/gpu-permutation-suite.md.
defaults:
  device: {kind: cuda, ordinal: 0}
  run: {warmups: 3, runs: 7, timing_scope: steady_state_host_api_plus_device_sync}
  verify: {reference: naive, rtol: 0, atol: 0}
backends:
  - tenferro-cuda-transpose
  - tenferro-cuda-to-contiguous
  - cutensor
  - pytorch-cuda
  - jax-cuda
  - memcpy-d2d
problems:
  source: data/instances/permutation_patterns.json
  include:
    - memcpy_24d_contiguous
    - transpose_2d_256
    - transpose_2d_1024
    - transpose_2d_2048
    - transpose_3d_256_201
    - transpose_3d_256_102
    - rotation_6d_32_32_32_32_16_16
    - reverse_20d_2
    - reverse_13d_2
    - cyclic_13d_2
    - tn_light_415_24d_scattered_to_colmajor
    - tn_light_415_24d_contiguous_same_perm
